name: Security CI

# Security gates for every push / PR: dependency vulnerabilities, secret
# scanning, type safety, lint, and the backend test suite. A failure here
# blocks the merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (API)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yatrago-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: yatrago-api/package-lock.json
      - run: npm ci
      - name: Dependency vulnerability audit (fail on high)
        run: npm audit --audit-level=high --omit=dev
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test

  admin:
    name: Admin console
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yatrago-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: yatrago-admin/package-lock.json
      - run: npm ci
      - name: Dependency vulnerability audit (fail on high)
        run: npm audit --audit-level=high --omit=dev
      - name: Type check & build
        run: npm run build

  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL static analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3
